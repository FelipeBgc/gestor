<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Entrar</h1>
            <p>Faça login para acessar o sistema de gestão.</p>
            <p class="login-info">Usuário padrão: <strong>admin</strong> / Senha: <strong>admin123</strong></p>
            <form id="login-form">
                <label for="username">Usuário</label>
                <input type="text" id="username" placeholder="admin" required>
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="admin123" required>
                <div id="login-message" class="login-message"></div>
                <button type="submit">Entrar</button>
            </form>
            <p class="login-info">Ainda não tem conta? <a href="register.html">Registrar</a></p>
        </div>
    </div>
    <script type="module" src="js/login.js"></script>
</body>
</html>
