<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="css/estoque.css">
</head>
<body>
    <button class="back-button" onclick="history.back()" aria-label="Voltar para página anterior">←</button>
    <button class="logout-button" id="logout-button" aria-label="Sair">Sair</button>
    <span class="logged-user">Loja: <strong id="shop-name"></strong></span>
    <div class="container">
        <h1>Estoque</h1>
        <div class="card inventory-list">
            <div class="row">
                <div class="field">
                    <label>Buscar no estoque</label>
                    <input type="text" id="inventory-search" placeholder="Procure por produto, detalhes ou tamanho" />
                </div>
                <div class="field">
                    <label>Itens no estoque</label>
                    <div id="inventory-count" class="inventory-count">0</div>
                </div>
            </div>

            <div id="inventory-warning" class="inventory-warning" aria-live="polite"></div>

            <div class="inventory-table-container">
                <table class="inventory-table">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Detalhes</th>
                            <th>Tamanho</th>
                            <th>Quantidade</th>
                            <th>Valor total</th>
                            <th>Preço venda</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-items">
                        <tr class="inventory-empty">
                            <td colspan="7">Nenhuma peça adicionada ao estoque ainda.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script type="module" src="js/estoque.js"></script>
</body>
</html>
