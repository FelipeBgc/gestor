<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="css/clientes.css">
</head>
<body>
    <button class="back-button" onclick="history.back()" aria-label="Voltar para página anterior">←</button>
    <button class="logout-button" id="logout-button" aria-label="Sair">Sair</button>
    <span class="logged-user">Loja: <strong id="shop-name"></strong></span>
    <div class="container">
        <h1>Clientes</h1>

        <div class="card">
            <div class="button-row">
                <button type="button" class="new-client-btn">Novo Cliente</button>
            </div>

            <div id="client-form" class="card client-card hidden-field" style="margin-top:18px;">
                <h2>Novo Cliente</h2>

                <div class="row">
                    <div class="field">
                        <label>Nome do cliente <span style="color:#ef4444">*</span></label>
                        <input type="text" class="client-name" placeholder="Nome completo" />
                    </div>
                    <div class="field">
                        <label>Como conseguiu</label>
                        <select class="client-source">
                            <option value="">-- selecione --</option>
                            <option value="indicacao">Indicação</option>
                            <option value="instagram">Instagram</option>
                            <option value="site">Site</option>
                            <option value="studio">Studio</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Tipo de Cliente</label>
                        <div style="display:flex;gap:12px;align-items:center;">
                            <label><input type="radio" name="client-type" value="pf" checked /> Pessoa Física</label>
                            <label><input type="radio" name="client-type" value="pj" /> Pessoa Jurídica</label>
                        </div>
                    </div>
                </div>

                <div class="row client-pf-row">
                    <div class="field">
                        <label>CPF</label>
                        <input type="text" class="client-cpf" placeholder="000.000.000-00" />
                    </div>
                </div>

                <div class="row client-pj-row hidden-field">
                    <div class="field">
                        <label>CNPJ</label>
                        <input type="text" class="client-cnpj" placeholder="00.000.000/0000-00" />
                    </div>
                    <div class="field">
                        <label>Razão Social</label>
                        <input type="text" class="client-razao" placeholder="Razão social" />
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Telefone</label>
                        <input type="tel" class="client-phone" placeholder="(00) 00000-0000" />
                    </div>
                    <div class="field">
                        <label>Endereço</label>
                        <input type="text" class="client-address" placeholder="Rua, Nº, Bairro, Cidade" />
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Data de aniversário</label>
                        <input type="date" class="client-birthday" />
                    </div>
                </div>

                <div class="row">
                    <div class="field">
                        <label>Anotações</label>
                        <textarea class="client-notes" rows="7" placeholder="Observações"></textarea>
                    </div>
                </div>

                <div class="button-row" style="margin-top:12px;">
                    <button type="button" class="save-client">Salvar Cliente</button>
                    <button type="button" class="secondary cancel-client">Cancelar</button>
                </div>
            </div>

            <div class="card" style="margin-top:20px;">
                <div class="row">
                    <div class="field">
                        <label>Pesquisar clientes</label>
                        <input type="text" id="clients-search" placeholder="Procure por nome, telefone ou origem" />
                    </div>
                    <div class="field">
                        <label>Clientes</label>
                        <div id="clients-count" class="inventory-count">0</div>
                    </div>
                </div>

                <div class="inventory-table-container">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Origem</th>
                                <th>Tipo</th>
                                <th>Documento</th>
                                <th>Telefone</th>
                                <th>Aniversário</th>
                            </tr>
                        </thead>
                        <tbody id="client-list">
                            <tr class="inventory-empty"><td colspan="6">Nenhum cliente cadastrado.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/clientes.js"></script>
</body>
</html>
