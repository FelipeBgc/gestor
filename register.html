<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar</title>
    <link rel="stylesheet" href="css/register.css">
</head>
<body>
    <div class="register-page">
        <div class="register-card">
            <h1>Registrar</h1>
            <p>Crie sua conta para gerenciar sua loja.</p>
            <form id="register-form">
                <label for="new-username">Usuário</label>
                <input type="text" id="new-username" placeholder="Digite seu usuário" required>

                <label for="shop-name">Nome da loja</label>
                <input type="text" id="shop-name" placeholder="Digite o nome da loja" required>

                <label for="new-password">Senha</label>
                <input type="password" id="new-password" placeholder="Digite sua senha" required>

                <label for="confirm-password">Confirmar senha</label>
                <input type="password" id="confirm-password" placeholder="Confirme sua senha" required>

                <div id="register-message" class="register-message"></div>
                <button type="submit">Registrar</button>
            </form>
            <p class="login-info">Já tem conta? <a href="login.html">Entrar</a></p>
        </div>
    </div>
    <script type="module" src="js/register.js"></script>
</body>
</html>
