<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão da Loja</title>
    <link rel="stylesheet" href="css/gestor.css">
</head>
<body>
    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">☰</button>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>Menu</span>
            <strong id="shop-name"></strong>
            <button class="logout-button" id="logout-button" aria-label="Sair">Sair</button>
            <button class="sidebar-close" id="sidebar-close" aria-label="Fechar menu">×</button>
        </div>
        <nav class="sidebar-nav">
            <a href="gestor.html" class="nav-link active">Início</a>
            <a href="perfil.html" class="nav-link">Perfil</a>
            <a href="cadastrar.html" class="nav-link">Cadastrar produto</a>
            <a href="estoque.html" class="nav-link">Estoque</a>
            <a href="clientes.html" class="nav-link">Clientes</a>
            <a href="pedidos.html" class="nav-link">Pedidos</a>
            <a href="agenda.html" class="nav-link">Agenda</a>
            <a href="financas.html" class="nav-link">Finanças</a>
        </nav>
    </aside>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="container">
        <header>
            <h1>Gestão da Loja</h1>
        </header>
        <main>
            <div class="shortcut-grid" id="shortcut-grid">
                <a href="cadastrar.html" class="shortcut-button">
                    <span class="shortcut-icon">➕</span>
                    <span>Cadastrar produto</span>
                </a>
                <a href="estoque.html" class="shortcut-button">
                    <span class="shortcut-icon">📦</span>
                    <span>Estoque</span>
                </a>
                <a href="clientes.html" class="shortcut-button">
                    <span class="shortcut-icon">👥</span>
                    <span>Clientes</span>
                </a>
                <a href="pedidos.html" class="shortcut-button">
                    <span class="shortcut-icon">🧾</span>
                    <span>Pedidos</span>
                </a>
                <a href="agenda.html" class="shortcut-button">
                    <span class="shortcut-icon">📅</span>
                    <span>Agenda</span>
                </a>
                <a href="financas.html" class="shortcut-button">
                    <span class="shortcut-icon">💰</span>
                    <span>Finanças</span>
                </a>
            </div>

            <section class="dashboard" style="margin-top: 32px;">
                <h2>Dashboard</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total de Produtos</h3>
                        <p class="stat-value" id="total-products">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total de Clientes</h3>
                        <p class="stat-value" id="total-clients">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Pedidos Pendentes</h3>
                        <p class="stat-value" id="pending-orders">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Faturamento Mês</h3>
                        <p class="stat-value" id="monthly-revenue">R$ 0,00</p>
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script type="module" src="js/script.js"></script>
    <script type="module" src="js/gestor.js"></script>
</body>
</html>
