<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecionando...</title>
    <meta http-equiv="refresh" content="0;url=login.html">
    <script>
      // Fallback JS redirect (mais suave em alguns hosts)
      (function(){
        try {
          if (location.pathname === '/' || location.pathname.endsWith('index.html')) {
            location.replace('login.html');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <p>Redirecionando para o login… <a href="login.html">Clique aqui se não for redirecionado</a></p>
  </body>
</html>
